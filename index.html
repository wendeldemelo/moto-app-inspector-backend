<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moto App Inspector - Core API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0F0F11;
            color: #E2E8F0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 30px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 500px;
        }
        h1 {
            color: #38BDF8;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p {
            color: #94A3B8;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .badge {
            background-color: #059669;
            color: #A7F3D0;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Moto App Inspector API</h1>
        <p>This is the asynchronous microservice gateway responsible for processing the application's ecosystem compliance and audit rules.</p>
        <div class="badge">STATUS: OPERATIONAL (POST ONLY)</div>
    </div>
</body>
</html>
